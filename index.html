<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .calculator {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 320px;
        }
        
        .display {
            background: #1e1e1e;
            color: #fff;
            font-size: 32px;
            text-align: right;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            min-height: 60px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f0f0f0;
            color: #333;
        }
        
        button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .operator {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .operator:hover {
            background: #5568d3;
        }
        
        .equals {
            background: #764ba2;
            color: white;
            font-weight: 600;
            grid-column: span 2;
        }
        
        .equals:hover {
            background: #623c8a;
        }
        
        .clear {
            background: #ff6b6b;
            color: white;
            font-weight: 600;
        }
        
        .clear:hover {
            background: #ee5a5a;
        }
        
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;
        
        // Обновление дисплея
        function updateDisplay() {
            // Ограничиваем длину отображаемого числа
            if (currentInput.length > 12) {
                display.textContent = currentInput.slice(0, 12);
            } else {
                display.textContent = currentInput;
            }
        }
        
        // Добавление цифры
        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '';
                shouldResetDisplay = false;
            }
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else if (number === '.' && currentInput.includes('.')) {
                // Не добавляем вторую точку в число
                const parts = currentInput.split(/[\+\-\*\/]/);
                if (parts[parts.length - 1].includes('.')) return;
                currentInput += number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }
        
        // Добавление оператора
        function appendOperator(operator) {
            const lastChar = currentInput.slice(-1);
            // Если последний символ — оператор, заменяем его
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            shouldResetDisplay = false;
            updateDisplay();
        }
        
        // Очистка дисплея
        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }
        
        // Удаление последнего символа
        function deleteLast() {
            if (currentInput.length === 1 || (currentInput.length === 2 && currentInput.startsWith('-'))) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }
        
        // Вычисление результата
        function calculate() {
            try {
                // Заменяем визуальные операторы на вычислимые
                let expression = currentInput;
                
                // Проверка на валидность выражения
                if (['+', '-', '*', '/'].includes(expression.slice(-1))) {
                    return; // Не вычисляем, если выражение заканчивается оператором
                }
                
                // Безопасное вычисление
                let result = Function('"use strict"; return (' + expression + ')')();
                
                // Округление длинных дробных чисел
                if (result % 1 !== 0) {
                    result = Math.round(result * 1000000) / 1000000;
                }
                
                currentInput = result.toString();
                shouldResetDisplay = true;
                updateDisplay();
            } catch (error) {
                currentInput = 'Ошибка';
                shouldResetDisplay = true;
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
        
        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (/[0-9]/.test(key)) {
                appendNumber(key);
            } else if (key === '.') {
                appendNumber('.');
            } else if (['+', '-', '*', '/'].includes(key)) {
                appendOperator(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
